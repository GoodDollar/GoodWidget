<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoodWidget — Plain HTML Alternative Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 24px;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .panel {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      border: 1px solid #ececec;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: 1px solid #d4d4d4;
      background: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }

    button.active {
      border-color: #0f68e6;
      color: #0f68e6;
      background: #eef5ff;
    }

    pre {
      margin-top: 12px;
      background: #f8f8f8;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      overflow-x: auto;
      border: 1px solid #ececec;
    }

    gw-claim-widget {
      display: block;
    }

    .pink-widget {
      --gw-token-color-primary: #E91E63;
      --gw-token-color-primaryDark: #AD1457;
    }

    .teal-widget {
      --gw-token-color-primary: #00897B;
      --gw-token-color-primaryDark: #00695C;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>GoodWidget HTML Demo (Alternative)</h1>
      <p class="subtitle">
        Single-widget demo to avoid cross-instance theme collisions in one document.
        Choose a variant and inspect behavior/theming on one mounted widget.
      </p>
      <div class="controls" id="variant-controls">
        <button data-variant="default" class="active">Default</button>
        <button data-variant="pink">Pink (CSS vars)</button>
        <button data-variant="teal">Teal (CSS vars)</button>
        <button data-variant="js">JS override</button>
        <button data-variant="card">Card+Button override</button>
        <button data-variant="wallet">Wallet provider</button>
      </div>
      <pre id="variant-code"></pre>
    </section>

    <section class="panel">
      <gw-claim-widget id="widget"></gw-claim-widget>
    </section>
  </main>

  <script type="module" src="/src/register-widgets.ts"></script>
  <script type="module">
    const widget = document.getElementById('widget')
    const controls = document.getElementById('variant-controls')
    const code = document.getElementById('variant-code')

    const snippets = {
      default: `<gw-claim-widget></gw-claim-widget>`,
      pink: `.pink-widget {\n  --gw-token-color-primary: #E91E63;\n  --gw-token-color-primaryDark: #AD1457;\n}`,
      teal: `.teal-widget {\n  --gw-token-color-primary: #00897B;\n  --gw-token-color-primaryDark: #00695C;\n}`,
      js: `widget.themeOverrides = {\n  tokens: { color: { primary: '#7B61FF', primaryDark: '#5A3FDB' } },\n  themes: { light_ClaimCard: { background: '#F3E5F5', borderColor: '#CE93D8' } }\n}`,
      card: `widget.themeOverrides = {\n  tokens: { color: { primary: '#FF6D00', primaryDark: '#E65100' } },\n  themes: {\n    light_Card: { background: '#FFF8E1', borderColor: '#FFB300' },\n    light_Button: { background: '#FF6D00', color: '#FFFFFF' }\n  }\n}`,
      wallet: `widget.provider = window.ethereum`,
    }

    function setActive(variant) {
      controls.querySelectorAll('button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.variant === variant)
      })
    }

    function resetWidgetState() {
      widget.classList.remove('pink-widget', 'teal-widget')
      widget.themeOverrides = undefined
      widget.provider = null
    }

    function applyVariant(variant) {
      resetWidgetState()

      if (variant === 'pink') {
        widget.classList.add('pink-widget')
      }

      if (variant === 'teal') {
        widget.classList.add('teal-widget')
      }

      if (variant === 'js') {
        widget.themeOverrides = {
          tokens: { color: { primary: '#7B61FF', primaryDark: '#5A3FDB' } },
          themes: {
            light_ClaimCard: {
              background: '#F3E5F5',
              borderColor: '#CE93D8',
            },
          },
        }
      }

      if (variant === 'card') {
        widget.themeOverrides = {
          tokens: { color: { primary: '#FF6D00', primaryDark: '#E65100' } },
          themes: {
            light_Card: {
              background: '#FFF8E1',
              borderColor: '#FFB300',
              shadowColor: 'rgba(255,179,0,0.15)',
            },
            light_Button: {
              background: '#FF6D00',
              backgroundHover: '#E65100',
              backgroundPress: '#BF360C',
              color: '#FFFFFF',
            },
          },
        }
      }

      if (variant === 'wallet' && window.ethereum) {
        widget.provider = window.ethereum
      }

      code.textContent = snippets[variant] ?? snippets.default
      setActive(variant)
    }

    customElements.whenDefined('gw-claim-widget').then(() => {
      applyVariant('default')

      controls.addEventListener('click', (event) => {
        const target = event.target
        if (!(target instanceof HTMLButtonElement)) return
        const variant = target.dataset.variant || 'default'
        applyVariant(variant)
      })
    })
  </script>
</body>
</html>
