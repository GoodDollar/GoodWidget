name: Agent-ready bounty
description: Create a GoodBounty issue that is readable by humans, executable by Copilot, and reviewable by contributors.
title: '[GoodBounty]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Use this template for GoodBounties that may be assigned to Copilot or another coding agent before human contributor review.

        The goal is not to write a long prompt. The goal is to create a clear execution contract:
        - humans can understand the bounty quickly
        - Copilot has enough context to produce a scoped PR
        - reviewers can verify the PR against explicit criteria

  - type: input
    id: bounty-summary
    attributes:
      label: Human summary
      description: One sentence describing the outcome. Keep this readable for contributors browsing the board.
      placeholder: 'Migrate the GoodWalletV2 claim flow into the Citizen Claim Widget using GoodSDKs.'
    validations:
      required: true

  - type: textarea
    id: why-this-matters
    attributes:
      label: Why this matters
      description: Explain the product or architecture reason in 2–4 sentences.
      placeholder: |
        This moves the widget closer to a real SDK-backed claim flow and gives us a reusable reference for future GoodWidget migrations.
    validations:
      required: true

  - type: dropdown
    id: bounty-tier
    attributes:
      label: Bounty tier
      description: Pick the expected bounty tier. Adjust before assignment if scope changes.
      options:
        - Basic
        - Common
        - Rare
        - Epic
        - Mythic
        - Legendary
    validations:
      required: true

  - type: dropdown
    id: bounty-type
    attributes:
      label: Bounty type
      description: Choose the closest category.
      options:
        - Bug fix
        - UI implementation
        - Widget feature
        - SDK integration
        - Architecture cleanup
        - Primitive migration
        - Documentation
        - QA / review
        - Research / specification
    validations:
      required: true

  - type: input
    id: target-package
    attributes:
      label: Target package or area
      description: Main package, app, or folder this bounty should touch.
      placeholder: 'packages/citizen-claim-widget'
    validations:
      required: true

  - type: input
    id: base-branch
    attributes:
      label: Required base branch
      description: The branch Copilot or the contributor must start from.
      placeholder: 'main'
      value: 'main'
    validations:
      required: true

  - type: textarea
    id: required-references
    attributes:
      label: Required references
      description: List all files, PRs, branches, docs, or external repositories that must be inspected before implementation.
      value: |
        The agent and contributor must inspect these before implementation:

        - `ARCHITECTURE.md`
        - `AGENTS.md`
        - `docs/demo-environment.md`

        Relevant source files / PRs / branches:
        - 

        If any required reference is unavailable, stop and comment exactly what is missing.
      placeholder: |
        - GoodWidget PR #...
        - GoodSDKs PR #...
        - GoodWalletV2/src/...
    validations:
      required: true

  - type: textarea
    id: source-to-target-mapping
    attributes:
      label: Source-to-target mapping
      description: Required for migrations or feature parity work. This prevents shallow “review related files” behavior.
      value: |
        Before coding, produce or complete this mapping.

        | Source behavior / UI section | Target widget section | Required state / prop / API | Verification |
        |---|---|---|---|
        |  |  |  |  |
        |  |  |  |  |
        |  |  |  |  |

        If this bounty is not a migration/parity task, explain why this mapping is not needed.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Be explicit about what must change and what may change.
      value: |
        Must change:
        - 

        May change:
        - 

        Must not change:
        -
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: List anything tempting but out of scope.
      value: |
        Do not include:
        - unrelated refactors
        - unrelated design-system changes
        - unrelated dependency upgrades
        - changes outside the target package unless explicitly listed in scope
    validations:
      required: true

  - type: checkboxes
    id: architecture-constraints
    attributes:
      label: Architecture constraints
      description: Check all constraints that apply. These become review criteria.
      options:
        - label: Keep SDK/protocol logic out of `packages/ui`.
          required: false
        - label: Keep widget-specific flow logic inside the widget package.
          required: false
        - label: Preserve the provider-first runtime path through `GoodWidgetProvider`.
          required: false
        - label: Preserve the current theming override precedence.
          required: false
        - label: Do not introduce new public theme targets unless explicitly listed.
          required: false
        - label: Do not bypass the EIP-1193/provider wrapper model.
          required: false
        - label: Do not modify demo packages except for explicit Storybook or verification deliverables.
          required: false
        - label: Do not touch unrelated primitives, packages, or dependencies.
          required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: These are the main pass/fail checks for the bounty.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
        - [ ]
    validations:
      required: true

  - type: textarea
    id: states-and-flows
    attributes:
      label: Required states, flows, or behaviors
      description: Use this especially for UI, wallet, claim, transaction, or async flows.
      value: |
        | State / flow | Trigger | Expected behavior | Verification |
        |---|---|---|---|
        | loading |  |  |  |
        |  |  |  |  |

        If no state machine or flow behavior is involved, write: "No state/flow matrix needed."
    validations:
      required: true

  - type: textarea
    id: sdk-and-version-checks
    attributes:
      label: SDK, dependency, and cross-repo checks
      description: Make version assumptions explicit. This avoids PR #11-style mismatch between unreleased SDK changes and published packages.
      value: |
        Required SDK/package assumptions:
        - 

        Cross-repo dependencies:
        - 

        Required check:
        - [ ] Confirm whether referenced SDK/API changes are already released, branch-only, local-only, or pending release.
        - [ ] If there is a version/capability gap, report it before implementing a workaround.
    validations:
      required: false

  - type: textarea
    id: storybook-requirements
    attributes:
      label: Storybook requirements
      description: Required for UI/widget work. Use Storybook as the canonical visual/review environment.
      value: |
        - [ ] Add or update a Storybook story.
        - [ ] Include deterministic mock fixtures if wallet/provider state is needed.
        - [ ] Add visible `data-testid` values for important states.
        - [ ] Cover at least these stories/states:
          - 
        - [ ] Add or update play-function tests if interaction behavior is part of the bounty.
    validations:
      required: false

  - type: textarea
    id: visual-requirements
    attributes:
      label: Visual and UX requirements
      description: Do not say “match the demo” without listing the visible sections or states that must match.
      value: |
        Required visible sections / UI details:
        - 

        Required responsive checks:
        - Desktop:
        - Mobile / narrow viewport:

        Screenshots or recordings required:
        -
    validations:
      required: false

  - type: textarea
    id: verification-commands
    attributes:
      label: Verification commands
      description: Commands Copilot/contributor should run and report in the PR body.
      value: |
        Run and report:

        ```sh
        pnpm build
        pnpm test:storybook
        pnpm test:demo
        ```

        If any command cannot run, explain why and what was run instead.
    validations:
      required: true

  - type: textarea
    id: pr-requirements
    attributes:
      label: Pull request requirements
      description: The PR must mirror the issue and provide review evidence.
      value: |
        The PR description must include:

        - Summary of changes
        - Source-to-target mapping, if applicable
        - Acceptance criteria checklist
        - Commands run
        - Storybook links, screenshots, or recordings for UI changes
        - Known risks / follow-ups
        - Any intentional deviations from this issue
    validations:
      required: true

  - type: checkboxes
    id: human-reviewer-checklist
    attributes:
      label: Human reviewer checklist
      description: Reviewers should use this before approving or requesting maintainer sign-off.
      options:
        - label: I reviewed the issue before reviewing the diff.
          required: false
        - label: I checked whether the PR solves the stated goal, not just a related problem.
          required: false
        - label: I checked scope boundaries and unrelated file changes.
          required: false
        - label: I checked architecture constraints.
          required: false
        - label: I reviewed Storybook or visual evidence where relevant.
          required: false
        - label: I checked verification command output or reproduced the checks.
          required: false
        - label: I left concrete review comments or fixed blockers directly.
          required: false

  - type: textarea
    id: risks-and-followups
    attributes:
      label: Known risks and follow-ups
      description: Capture uncertainty before implementation starts.
      placeholder: |
        - SDK release dependency may not be published yet.
        - Storybook fixture may not cover real wallet behavior.
        - Follow-up bounty may be needed for ...
    validations:
      required: false

  - type: checkboxes
    id: spec-readiness-check
    attributes:
      label: Spec readiness check
      description: Complete this before assigning the bounty to Copilot or a contributor.
      options:
        - label: Required references are listed and accessible.
          required: true
        - label: Scope and non-goals are clear.
          required: true
        - label: Source-to-target mapping is complete, or explicitly marked not applicable.
          required: true
        - label: SDK/version assumptions are checked, or explicitly marked not applicable.
          required: true
        - label: Acceptance criteria are testable.
          required: true
        - label: Storybook/Playwright expectations are clear, or explicitly marked not applicable.
          required: true
        - label: Verification commands are listed.
          required: true
        - label: This issue is ready for Copilot execution.
          required: true
