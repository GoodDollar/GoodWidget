name: GoodWidget Spec Template
description: Define the requirements for a new GoodWidget
body:
  - type: textarea
    id: short_description
    attributes:
      label: Short description of the new GoodWidget
      description: |
        A short description of the new GoodWidget. This should be a concise summary of the widget's purpose and functionality.
      value: |
        A short description of the new GoodWidget. This should be a concise summary of the widget's purpose and functionality.
    validations:
      required: true

  - type: textarea
    id: repos_and_packages
    attributes:
      label: Which repos and packages the AI should work with
      description: |
        List the repositories and packages the AI should work with.
      value: |
        List the repositories and packages the AI should work with.
    validations:
      required: true

  - type: textarea
    id: ui_implementation_reference
    attributes:
      label: UI implementation reference
      description: |
        Any of the following:

        - instruction to copy from another repo
        - provide screenshots
      value: |
        Any of the following:

        - instruction to copy from another repo
        - provide screenshots
    validations:
      required: true

  - type: textarea
    id: user_flows_states_behaviours
    attributes:
      label: User flows, states and behaviours
      description: |
        If no UI reference is given, elaborate how the UI/UX behaves.
        Any other UI/UX instructions to the AI.
      value: |
        If no UI reference is given, elaborate how the UI/UX behaves.
        Any other UI/UX instructions to the AI.
    validations:
      required: true

  - type: textarea
    id: create_the_plan
    attributes:
      label: Create the plan (keep this section in the issue body)
      description: |
        This content is persisted in the issue body and should be used by the planner/copilot flow.
      value: |
        ## Create the plan

        Based on the above description create an execution plan in a **new sub-issue** and preserve the original issue content unchanged.
        Do not execute the plan until given instructions to do so.

        Sub-issue requirements:

        - Title format: `[DRAFT][PLAN] <what issue is being planned>`
        - Type: `Task`
        - Description must start with: `<sub-issue title>`
        - Link the sub-issue back to this parent issue.

        Instructions when creating the plan:

        - Map relevant files that are too be used as reference from all repos mentioned
        - import existing @GoodDollar packages
        - Map new components that should be created. Assess when a new component should be created in the new savings widget package or made part of the reusable packages/ui

        Plan specification required sections:

        - Required states, flows, and behaviors
        - Execution plan
        - acceptance criteria
        - human-reviewer checklist
    validations:
      required: true
