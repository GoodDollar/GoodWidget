# Copilot cloud agent bootstrap
# This file runs once when a Copilot cloud agent task starts. It installs all
# dependencies, builds the monorepo packages, and installs the Playwright browser
# so the demo app can be started and tested immediately without extra setup.
#
# After these steps complete, the demo server can be started with:
#   pnpm --filter @goodwidget/example-react-web dev
# which starts on http://localhost:3000 (as configured in vite.config.ts).
#
# Playwright smoke tests can then be run with:
#   pnpm test:demo

name: Copilot setup steps

on:
  # Allows workflow_call so Copilot cloud agent can invoke it
  workflow_call: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      # 1. Enable corepack so the declared pnpm version (packageManager field) is used
      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      # 2. Install all monorepo dependencies via pnpm workspaces
      - name: Install dependencies
        run: pnpm install

      # 3. Build all workspace packages so examples can import them
      - name: Build packages
        run: pnpm build

      # 4. Install the Chromium browser and its OS-level deps for Playwright
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
